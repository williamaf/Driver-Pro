<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Driver-Pro">
    
    <title>Driver-Pro Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #05070A; 
            --card: rgba(15, 23, 42, 0.6); 
            --inner: rgba(30, 41, 59, 0.5);
            --blue: #38BDF8; 
            --blue-deep: #007AFF; 
            --purple: #C084FC;
            --border: rgba(255, 255, 255, 0.1); 
            --sheet-bg: #0F172A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at top, #1e293b 0%, #05070a 100%) !important; 
            color: #F8FAFC !important; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            padding-top: env(safe-area-inset-top);
        }

        @keyframes shineMove {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .logo-animado { 
            font-size: 1.8rem; font-weight: 900; 
            background: linear-gradient(90deg, #1e293b 0%, var(--blue) 50%, #1e293b 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shineMove 3s linear infinite;
            letter-spacing: -1px;
        }

        .header { flex-shrink: 0; padding: 15px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 10; }
        .top-section { flex-grow: 1; padding: 10px 12px; display: flex; flex-direction: column; gap: 12px; z-index: 5; overflow-y: auto; }
        
        /* Glassmorphism Cards */
        .card { 
            background: var(--card) !important; 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 16px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); 
        }

        .card-balance { padding: 30px 16px !important; text-align: center; }
        .inner-box { background: var(--inner) !important; border-radius: 16px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }

        .total-val { 
            font-size: 3.5rem; font-weight: 900; color: #FFF; text-align: center; 
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4); line-height: 1.1; margin-top: 5px;
        }
        
        .row { display: flex; gap: 8px; width: 100%; }
        .col { flex: 1; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--blue); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; opacity: 0.8; }
        
        input, select { 
            width: 100% !important; padding: 14px !important; border-radius: 14px !important; 
            background: rgba(0, 0, 0, 0.2) !important; color: #FFF !important; border: 1px solid var(--border) !important; 
            font-size: 1rem !important; outline: none;
        }

        .btn { border: none; border-radius: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .btn-save { background: linear-gradient(135deg, var(--blue-deep), #00c6ff) !important; color: #FFF !important; padding: 18px; width: 100%; margin-top: 5px; box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4); }
        .btn-tool { background: var(--inner) !important; color: #FFF !important; padding: 14px; border: 1px solid var(--border); flex: 1; font-size: 0.75rem; }

        /* Bottom Sheet Moderna */
        .sheet {
            position: fixed; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top-left-radius: 32px; border-top-right-radius: 32px;
            z-index: 100; transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); 
            border-top: 1px solid var(--border); height: 75vh;
            transform: translateY(calc(100% - 80px));
        }

        .sheet.open { transform: translateY(0); }
        .sheet-header { padding: 12px 16px 20px 16px; display: flex; flex-direction: column; align-items: center; }
        .sheet-handle { width: 45px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-bottom: 12px; }
        
        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.03); padding: 16px; border-radius: 20px; 
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        
        .btn-ia-float { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--blue-deep); color: white; border: none; z-index: 150; box-shadow: 0 8px 25px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s ease-in-out; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 class="logo-animado">Driver-Pro</h1>
        <div style="width: 40px; height: 2px; background: var(--blue); margin-top: 20px; border-radius: 2px;"></div>
    </div>

    <div class="header">
        <div class="logo-animado">Driver-Pro</div>
        <i class="fas fa-chart-line" style="color: var(--blue);"></i>
    </div>

    <div class="top-section">
        <div class="card card-balance">
            <label>Balance del Periodo</label>
            <p class="total-val" id="totalBalance">$ 0</p>
        </div>

        <div class="card card-registro">
            <div class="inner-box">
                <div class="row">
                    <div class="col"><label><i class="far fa-calendar-alt"></i> Desde</label><input type="date" id="fechaDesde" onchange="renderizar()"></div>
                    <div class="col"><label><i class="far fa-calendar-alt"></i> Hasta</label><input type="date" id="fechaHasta" onchange="renderizar()"></div>
                </div>
            </div>
            <div class="inner-box">
                <div class="row">
                    <div class="col" style="flex: 1.4;"><label>Monto ($)</label><input type="number" id="monto" placeholder="0.00" inputmode="decimal"></div>
                    <div class="col">
                        <label>Categoría</label>
                        <select id="categoria">
                            <option value="Uber/Didi">Viaje (Ingreso)</option>
                            <option value="Gasolina">Gasolina</option>
                            <option value="Peaje">Peaje</option>
                            <option value="Mantenimiento">Mantenimiento</option>
                            <option value="Comida">Comida</option>
                            <option value="Entrega">Entrega</option>
                            <option value="William">Personal</option>
                        </select>
                    </div>
                </div>
            </div>
            <button class="btn btn-save" onclick="guardar()"><i class="fas fa-check-circle"></i> GUARDAR REGISTRO</button>
            <div class="row" style="margin-top: 12px;">
                <button class="btn btn-tool" onclick="compartirWhatsApp()"><i class="fab fa-whatsapp"></i> REPORTE</button>
                <button class="btn btn-tool" onclick="crearBackup()"><i class="fas fa-file-export"></i> BKP</button>
                <button class="btn btn-tool" onclick="importarBackup()"><i class="fas fa-file-import"></i> REST</button>
            </div>
        </div>
        <div style="height: 100px;"></div> </div>

    <div class="sheet" id="bottomSheet">
        <div class="sheet-header" id="sheetHeader" onclick="document.getElementById('bottomSheet').classList.toggle('open')">
            <div class="sheet-handle"></div>
            <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:800; font-size:0.9rem;">MOVIMIENTOS RECUPERADOS</span>
                <span style="color:#F87171; font-size:0.7rem; font-weight:900;" onclick="resetear()">BORRAR TODO</span>
            </div>
        </div>
        <div class="sheet-content" id="listaContenedor" style="padding: 15px; overflow-y: auto; height: calc(100% - 80px);"></div>
    </div>

    <button class="btn-ia-float" onclick="document.getElementById('iaPanel').classList.toggle('active')">
        <i class="fas fa-brain"></i>
    </button>

    <script>
        let registros = JSON.parse(localStorage.getItem('driver_pro_v2')) || [];
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fechaDesde').value = hoy;
        document.getElementById('fechaHasta').value = hoy;

        function guardar() {
            const m = document.getElementById('monto').value;
            const c = document.getElementById('categoria').value;
            const f = document.getElementById('fechaDesde').value;
            if(!m || m <= 0) return alert("Ingresa un monto");
            
            registros.unshift({ 
                id: Date.now(), 
                monto: parseFloat(m), 
                categoria: c, 
                fecha: f, 
                tipo: (c === 'Uber/Didi') ? 'ingreso' : 'egreso' 
            });
            
            document.getElementById('monto').value = '';
            sincronizar();
        }

        function sincronizar() { 
            localStorage.setItem('driver_pro_v2', JSON.stringify(registros)); 
            renderizar(); 
        }

        function renderizar() {
            const d = document.getElementById('fechaDesde').value;
            const h = document.getElementById('fechaHasta').value;
            const lista = document.getElementById('listaContenedor');
            let neto = 0; 
            lista.innerHTML = '';

            const filtrados = registros.filter(r => r.fecha >= d && r.fecha <= h);

            filtrados.forEach(r => {
                const esI = r.tipo === 'ingreso';
                neto += esI ? r.monto : -r.monto;
                lista.innerHTML += `
                    <div class="item">
                        <div>
                            <p style="font-weight:700;">${r.categoria}</p>
                            <small style="opacity:0.5; font-size:0.7rem;">${r.fecha}</small>
                        </div>
                        <div style="text-align:right">
                            <b style="color:${esI?'#38BDF8':'#F87171'}">${esI?'+':'-'} $${r.monto.toLocaleString()}</b>
                        </div>
                    </div>`;
            });
            
            // CORRECCIÓN DEL ERROR DE VARIABLE
            document.getElementById('totalBalance').innerText = `$ ${neto.toLocaleString()}`;
        }

        function resetear() {
            if(confirm("¿Eliminar todos los registros?")) {
                registros = [];
                sincronizar();
            }
        }

        // Splash screen auto-hide
        window.onload = () => {
            renderizar();
            setTimeout(() => {
                const sp = document.getElementById('splash');
                sp.style.opacity = '0';
                setTimeout(() => sp.style.display = 'none', 800);
            }, 1200);
        };
    </script>
</body>
</html>
